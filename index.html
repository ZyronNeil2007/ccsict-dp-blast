<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCSICT DP BLAST | CCSICT CSBO</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Animated Floating Orbs Background -->
    <div class="floating-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="container main-content min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
        <!-- Hero Section -->
        <header class="hero-section text-center mb-4 w-100 animate-fade-up">
            <div class="d-flex align-items-center justify-content-center flex-wrap mb-3">
                <img src="images/logo/isu_logo.png" alt="ISU Logo" class="logo mx-2 mb-2"
                    onerror="this.style.display='none'">
                <div class="d-flex align-items-center mb-2 mx-2">
                    <img src="images/logo/ccsict_logo1.png" alt="CCSICT Logo" class="logo mx-2"
                        onerror="this.style.display='none'">
                    <img src="images/logo/csbo-computing student body org..png" alt="CSBO Logo" class="logo mx-2"
                        onerror="this.style.display='none'">
                </div>
            </div>
            <h1 class="display-5 fw-bolder text-white tracking-wide mb-2">CCSICT <span class="text-accent">DP
                    Blast</span></h1>
            <p class="text-white-70 fw-medium tracking-wide mx-auto" style="max-width: 600px;">Welcome Back,! |
                S.Y. 2026–2027<br>Upload your photo to generate your official DP frame.</p>
        </header>

        <div class="glass-card p-4 p-md-5 w-100 animate-fade-up delay-1" style="max-width: 800px;">

            <!-- Step 1: Upload & Select Role -->
            <div class="step-section mb-5 animate-fade-up delay-2">
                <h3 class="h5 text-white mb-3 d-flex align-items-center">
                    <span class="step-badge">1</span> Upload & Select Role
                </h3>
                <div class="row g-3">
                    <div class="col-md-6">
                        <input class="form-control file-input" type="file" id="uploadImage"
                            accept="image/png, image/jpeg, image/webp" aria-label="Upload Photo">
                    </div>
                    <div class="col-md-6">
                        <select class="form-select role-select" id="roleSelect" aria-label="Select Role">
                            <option value="" disabled selected>Select your role...</option>
                            <option value="FreshieS">Freshie</option>
                            <option value="sophemore">Sophomore</option>
                            <option value="junior">Junior</option>
                            <option value="Senior">Senior</option>
                            <option value="Faculty">Faculty</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Step 2: Adjust Picture -->
            <div class="step-section mb-5 text-center animate-fade-up delay-3">
                <h3 class="h5 text-white mb-3 text-start d-flex align-items-center">
                    <span class="step-badge">2</span> Adjust Picture
                </h3>

                <!-- Canvas Container that maintains aspect ratio and responsiveness -->
                <div class="canvas-container mx-auto mb-3">
                    <canvas id="dpCanvas" width="1080" height="1080"></canvas>
                </div>

                <!-- Zoom Control -->
                <div class="d-flex align-items-center justify-content-center mx-auto" style="max-width: 400px;">
                    <i class="ph ph-magnifying-glass-minus text-white me-3 fs-5"></i>
                    <input type="range" class="form-range flex-grow-1 slider-accent" id="zoomSlider" min="0.1" max="3"
                        step="0.01" value="1">
                    <i class="ph ph-magnifying-glass-plus text-white ms-3 fs-5"></i>
                </div>
                <small class="text-white-50 mt-2 mb-4 d-block"><i class="ph ph-arrows-out-cardinal me-1"></i> Click and
                    drag the
                    image to center your face.</small>
            </div>

            <!-- Step 3: Download & Share -->
            <div class="step-section animate-fade-up delay-4">
                <h3 class="h5 text-white mb-3 text-start d-flex align-items-center">
                    <span class="step-badge">3</span> Download & Share
                </h3>
                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <button class="btn btn-accent px-4 py-2 fw-bold d-flex align-items-center" id="downloadBtn">
                        <i class="ph ph-download-simple me-2 fs-5"></i> Download DP
                    </button>
                    <button class="btn btn-outline-light px-4 py-2 fw-bold d-flex align-items-center" id="shareBtn">
                        <i class="ph ph-share-network me-2 fs-5"></i> Share
                    </button>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <footer class="mt-4 text-center text-white-50 w-100 animate-fade-up delay-4">
            <p class="mb-1 fw-medium tracking-wide">Version 1.0.0</p>
            <p class="small mb-0">Developed by <span class="text-accent fw-bold">ZYRON NEIL BAUTISTA | CCSICT
                    CSBO</span></p>
        </footer>
    </div>

    <!-- Main JavaScript File -->
    <script src="app.js"></script>
</body>

</html>
